services:
  - type: web
    name: obeida-online-bot
    runtime: image
    image:
      url: docker.io/python:3.11-slim
    buildCommand: |
      apt-get update && apt-get install -y chromium xvfb
      pip install --no-cache-dir pyTelegramBotAPI requests aiohttp fake-useragent Faker colorama playwright
      playwright install chromium
    startCommand: Xvfb :99 -screen 0 1280x1024x24 & export DISPLAY=:99 && python Bot.py
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "10000"
