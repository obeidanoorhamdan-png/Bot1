services:
  - type: worker
    name: obeida-online-bot
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: |
      pip install --upgrade pip
      pip install python-telegram-bot==20.7 requests==2.31.0 aiohttp==3.9.1 beautifulsoup4==4.12.2 fake-useragent==1.4.0 Faker==20.1.0 colorama==0.4.6 pyfiglet==0.8.post1 cfonts==3.2.0 user_agent==0.1.10
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: TZ
        value: Asia/Baghdad
